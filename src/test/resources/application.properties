spring.application.name=job-portal

#H2 Database
spring.datasource.url=jdbc:h2:mem:jobportaldb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

#JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

#H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

#JWT
jwt.secret=dGhpc0lzQVN1cGVyU2VjcmV0S2V5Rm9ySm9iUG9ydGFsQXBwbGljYXRpb24yMDI2
jwt.expiration=86400000
jwt.refresh-expiration=604800000

#File Upload
file.upload-dir=uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

#Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.endpoint.health.roles=ADMIN
management.info.env.enabled=true
info.app.name=Job Portal API
info.app.description=A comprehensive job portal backend built with Spring Boot
info.app.version=1.0.0
info.app.java-version=21

#Rate Limiting (disabled for tests by default)
rate-limit.enabled=false
rate-limit.max-requests=50
rate-limit.window-seconds=60
